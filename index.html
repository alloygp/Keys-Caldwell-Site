// ─── HELPERS  (don't usually edit) ───────────────────────────
// Splits a plain headline string into "before <em>italic</em> after"
// using the chosen italic substring. Works in JSX.
const italicize = (text, italicPart) => {
  if (!italicPart || !text.includes(italicPart)) return text;
  const [before, after] = text.split(italicPart);
  return <>{before}<em>{italicPart}</em>{after}</>;
};
// Renders a quote string honoring \n as <br/>.
const withBreaks = (str) => str.split('\n').flatMap((line, i, arr) =>
  i === arr.length - 1 ? [line] : [line, <br key={i}/>]
);

    numeral: <>N<sup>o</sup>{CONTENT.hero.numeral}</>,

    trustStats: CONTENT.hero.trustStats,
    credentials: CONTENT.hero.credentials,

    title: italicize(CONTENT.pillars.titlePlain, CONTENT.pillars.titleItalic),

    items: CONTENT.fourChamber.items,

  const quoteContent = {

    quote: withBreaks(CONTENT.quote.quote),
    attribution: CONTENT.quote.attribution,

  return (

      <KCPillars         content={pillarsContent} />

      <KCFourChamber     content={fourChamberContent} />
      <KCQuote           content={quoteContent} />
      <KCTestimonial     content={CONTENT.testimonial} />
      <KCDifferentiators content={CONTENT.differentiators} />
      <KCCtaBand         content={CONTENT.ctaBand} />
      <KCFooter          content={CONTENT.footer} />
    </div>
  );
};

// Apply SEO meta + JSON-LD (idempotent; safe to run before render).
KCSeo.apply(CONTENT.meta, {
  pageType:    "homepage",
  pageUrl:     CONTENT.meta.canonical,
  breadcrumbs: [{ label: "Home" }],   // single-item — no breadcrumb UI on homepage
});

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);

// Resolve Lucide icons after render.
requestAnimationFrame(() => { if (window.lucide) window.lucide.createIcons(); });
setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 400);
