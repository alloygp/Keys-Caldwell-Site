      </div>
    </section>
  );
};

const KCOwnExpect = ({ content }) => {
  const c = content || {};
  return (
    <section className="kc-own-expect">
      <div className="kc-container">
        <div className="kc-own-expect-grid">
          <div>
            {c.eyebrow && <div className="kc-eyebrow">{c.eyebrow}</div>}
            <h2>{c.titlePlain} <em>{c.titleItalic}</em></h2>
            <p className="kc-own-expect-p">{c.p}</p>
          </div>
          <div>
            <ul className="kc-own-expect-list">
              {(c.rows || []).map((r, i) => (
                <li className="kc-own-expect-row" key={i}>
                  <div className="kc-own-expect-row-l">{r.l}</div>
                  <div className="kc-own-expect-row-r">{r.r}</div>
                </li>
              ))}
            </ul>
          </div>
        </div>
      </div>
    </section>
  );
};

const KCOwnContact = ({ content }) => {
  const c = content || {};
  return (
    <section className="kc-own-contact">
      <div className="kc-container">
        <div className="kc-own-contact-eye">{c.eyebrow}</div>
        <h2>{c.titlePlain} <em>{c.titleItalic}</em></h2>
        <div className="kc-own-contact-grid">
          {(c.blocks || []).map((b, i) => (
            <div className="kc-own-contact-block" key={i}>
              <div className="kc-own-contact-block-eye">{b.eye}</div>
              <h3 className="kc-own-contact-block-h">{b.h}</h3>
              <div className="kc-own-contact-block-big">{b.big}</div>
              <p className="kc-own-contact-block-p">{b.p}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

const Page = () => (
  <div className="kc-page">
    <KCNav active={CONTENT.nav.active} />
    <KCBreadcrumbs content={CONTENT.breadcrumbs} />
    <KCOwnHero     content={CONTENT.hero} />
    <KCOwnActions  content={CONTENT.actions} />
    <KCOwnAssoc    content={CONTENT.assoc} />
    <KCOwnExpect   content={CONTENT.expect} />
    <KCOwnContact  content={CONTENT.contact} />
    <KCCtaBand     content={CONTENT.ctaBand} />
    <KCFooter      content={CONTENT.footer} />
  </div>
);

KCSeo.apply(CONTENT.meta, {
  pageType:    "info",
  pageUrl:     CONTENT.meta.canonical,
  breadcrumbs: CONTENT.breadcrumbs.items,
});

const renderWhenReady = () => {
  if (typeof KCNav === 'undefined') {
    return setTimeout(renderWhenReady, 30);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  requestAnimationFrame(() => { if (window.lucide) window.lucide.createIcons(); });
  setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 400);
};
renderWhenReady();
</script>

</body>
</html>
