  @media (max-width: 900px) {
    .kc-tm-grid { grid-template-columns: 1fr; }
    .kc-tm-hero-h { font-size: 40px; }
    .kc-tm-featured-grid { grid-template-columns: 1fr; gap: 20px; }
    .kc-tm-featured-mark { font-size: 80px; }
    .kc-tm-featured-q { font-size: 24px; }
    .kc-tm-filter-bar { position: static; }
    .kc-tm-filter-row { gap: 16px; }
  }
</style>

  </section>
);

const KCTestimonialsWall = ({ content: c }) => {
  const [active, setActive] = React.useState('all');

  // Count per filter (excluding 'all')
  const counts = React.useMemo(() => {
    const out = { all: c.items.length };
    c.filters.forEach(f => {
      if (f.id === 'all') return;
      out[f.id] = c.items.filter(it => it.types.includes(f.id)).length;
    });
    return out;
  }, [c.items, c.filters]);

  const visible = active === 'all'
    ? c.items
    : c.items.filter(it => it.types.includes(active));

  // Build human-readable type label for each card (e.g. "Condominium · Coastal")
  const typeLabel = (types) => {
    const map = { condo: 'Condominium', hoa: 'HOA', coastal: 'Coastal', inland: 'Inland' };
    return types.map(t => map[t]).filter(Boolean).join(' · ');
  };

  return (
    <>
      <div className="kc-tm-filter-bar">
        <div className="kc-container">
          <div className="kc-tm-filter-row">
            <span className="kc-tm-filter-eye">Filter</span>
            <div className="kc-tm-filter-pills" role="tablist" aria-label="Filter testimonials by community type">
              {c.filters.map(f => (
                <button
                  key={f.id}
                  role="tab"
                  aria-selected={active === f.id}
                  className={'kc-tm-filter-pill' + (active === f.id ? ' is-active' : '')}
                  onClick={() => setActive(f.id)}
                >
                  {f.label}
                  <span className="kc-tm-filter-pill-count">{counts[f.id]}</span>
                </button>
              ))}
            </div>
            <div className="kc-tm-filter-count">
              Showing <strong>{visible.length}</strong> of <strong>{c.items.length}</strong>
            </div>
          </div>
        </div>
      </div>

      <section className="kc-tm-wall">
        <div className="kc-container">
          <div className="kc-tm-grid">
            {visible.length === 0 ? (
              <div className="kc-tm-empty">
                <h3 className="kc-tm-empty-h">No quotes match that filter yet.</h3>
                <p className="kc-tm-empty-p">Reset filter to see all 13 quotes.</p>
              </div>
            ) : visible.map((it, i) => (
              <article key={i} className="kc-tm-card">
                <div className="kc-tm-card-tags">
                  <span className="kc-tm-card-tag">{typeLabel(it.types)}</span>
                  {it.tenure && <span className="kc-tm-card-tag is-tenure">{it.tenure}</span>}
                </div>
                <p className="kc-tm-card-q">{it.quote}</p>
                <div className="kc-tm-card-attr">
                  <div className="kc-tm-card-init">{it.initials}</div>
                  <div>
                    <p className="kc-tm-card-name">{it.name}</p>
                    <p className="kc-tm-card-role">{it.role}</p>
                  </div>
                </div>
              </article>
            ))}
          </div>
        </div>
      </section>
    </>
  );
};

// ─── Page ───────────────────────────────────────────────

const Page = () => (
  <div className="kc-page">
    <KCNav                  active={CONTENT.nav.active} />
    <KCBreadcrumbs          content={CONTENT.breadcrumbs} />
    <KCTestimonialsHero     content={CONTENT.hero} />
    <KCTestimonialFeatured  content={CONTENT.featured} />
    <KCTestimonialsWall     content={CONTENT.wall} />
    <KCCtaBand              content={CONTENT.ctaBand} />
    <KCFooter               content={CONTENT.footer} />
  </div>
);

KCSeo.apply(CONTENT.meta, {
  pageType:    "core",
  pageUrl:     CONTENT.meta.canonical,
  breadcrumbs: CONTENT.breadcrumbs.items,
});

const renderWhenReady = () => {
  if (typeof KCNav === 'undefined') {
    return setTimeout(renderWhenReady, 30);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  requestAnimationFrame(() => { if (window.lucide) window.lucide.createIcons(); });
  setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 400);
};
renderWhenReady();
</script>

</body>
</html>
