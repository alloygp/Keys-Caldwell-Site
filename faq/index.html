// ─── Custom inline sections ─────────────────────────────

const KCFAQHero = ({ content: c }) => (
  <section className="kc-faq-hero">
    <div className="kc-container">
      <div className="kc-faq-hero-inner">
        <div className="kc-faq-hero-eye">{c.eyebrow}</div>
        <h1 className="kc-faq-hero-h">
          {c.titlePlain} <em>{c.titleItalic}</em>
        </h1>
        <hr className="kc-faq-hero-rule" />
        <p className="kc-faq-hero-lede">{c.lede}</p>
        <div className="kc-faq-hero-meta">
          {c.meta.map(m => (
            <div key={m.label}>
              <strong>{m.label}:</strong> {m.value}
            </div>
          ))}
        </div>
      </div>
    </div>
  </section>
);

// Slugify a question for per-Q anchors
const qSlug = (q) => q.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 60);

// Render <a> tags inside answer text where strings contain "/path/" or "https://"
const linkify = (text) => {
  if (typeof text !== 'string') return text;
  // Detect /path/ links and wrap them as anchor tags
  const parts = text.split(/(\s\/[a-z0-9\-\/]+\/)/g);
  if (parts.length === 1) return text;
  return parts.map((part, i) => {
    if (part.match(/^\s\/[a-z0-9\-\/]+\/$/)) {
      const path = part.trim();
      return <React.Fragment key={i}> <a href={kcHref(path + 'index.html')}>{path}</a></React.Fragment>;
    }
    return <React.Fragment key={i}>{part}</React.Fragment>;
  });
};

const KCFAQDirectory = ({ content: c }) => (
  <section className="kc-faq-directory">
    <div className="kc-container">
      <div className="kc-faq-directory-grid">
        <nav className="kc-faq-nav" aria-label="FAQ categories">
          <div className="kc-faq-nav-eye">Categories</div>
          <ul className="kc-faq-nav-list">
            {c.categories.map(cat => (
              <li key={cat.id}>
                <a href={`#${cat.id}`}>
                  {cat.title.replace(/\.$/, '')}
                  <span>{cat.num}</span>
                </a>
              </li>
            ))}
          </ul>
        </nav>
        <div>
          {c.categories.map(cat => (
            <section key={cat.id} id={cat.id} className="kc-faq-cat">
              <header className="kc-faq-cat-head">
                <span className="kc-faq-cat-num">Category {cat.num}</span>
                <h2 className="kc-faq-cat-h">{cat.title}</h2>
                {cat.intro && <p className="kc-faq-cat-intro">{cat.intro}</p>}
              </header>
              {cat.items.map((it, i) => {
                const slug = qSlug(it.q);
                const paragraphs = Array.isArray(it.a) ? it.a : [it.a];
                return (
                  <article key={slug} className="kc-faq-q" id={slug}>
                    <h3 className="kc-faq-q-h">{it.q}</h3>
                    <div className="kc-faq-a">
                      {paragraphs.map((p, j) => <p key={j}>{linkify(p)}</p>)}
                    </div>
                    <a className="kc-faq-q-anchor" href={`#${slug}`}>↳ Link to this question</a>
                  </article>
                );
              })}
            </section>
          ))}
        </div>
      </div>
    </div>
  </section>
);

// ─── Page ───────────────────────────────────────────────

const Page = () => (
  <div className="kc-page">
    <KCNav             active={CONTENT.nav.active} />
    <KCBreadcrumbs     content={CONTENT.breadcrumbs} />
    <KCFAQHero         content={CONTENT.hero} />
    <KCFAQDirectory    content={CONTENT.directory} />
    <KCCtaBand         content={CONTENT.ctaBand} />
    <KCFooter          content={CONTENT.footer} />
  </div>
);

// Flatten categorized Q/As for FAQPage schema
const allFaqs = CONTENT.directory.categories.flatMap(cat =>
  cat.items.map(it => ({
    q: it.q,
    a: Array.isArray(it.a) ? it.a.join(' ') : it.a,
  }))
);

KCSeo.apply(CONTENT.meta, {
  pageType:    "core",
  pageUrl:     CONTENT.meta.canonical,
  breadcrumbs: CONTENT.breadcrumbs.items,
  faqs:        allFaqs,
});

const renderWhenReady = () => {
  if (typeof KCNav === 'undefined') {
    return setTimeout(renderWhenReady, 30);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  requestAnimationFrame(() => { if (window.lucide) window.lucide.createIcons(); });
  setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 400);
};
renderWhenReady();
</script>
