/* ── Service Areas hub — page-specific styles ─────────────── */

}

}
.sa-hero-eye {

}
.sa-hero-h {

}
.sa-hero-h em {
  font-style: italic; color: var(--kc-indigo); font-weight: 700;
}
.sa-hero-lede {

}
.sa-hero-meta {

}
.sa-hero-meta-cell {

  border-right: 1px solid var(--shell-line);
}
.sa-hero-meta-cell:last-child {
  border-right: 0;

}
.sa-hero-meta-cell:first-child {

}
.sa-hero-meta-k {

}

  background: var(--shell);
}
.sa-region:nth-child(even) { background: #fcfaf6; }
.sa-region-head {
  display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr); gap: 64px;
  margin-bottom: 56px;
  align-items: start;
}
.sa-region-eye {
  font-family: var(--font-heading); font-style: italic; font-weight: 600;

.sa-region-h em { font-style: italic; color: var(--kc-indigo); font-weight: 700; }
.sa-region-blurb {
  font-family: var(--font-body); font-size: 17px; line-height: 1.55;
  color: var(--deep-ink); opacity: .82; margin: 0;
}

.sa-cities {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--shell-line);
}
.sa-city {
  display: grid;
  grid-template-columns: 28px minmax(0, 220px) minmax(0, 1fr) 96px;
  align-items: center;
  gap: 32px;
  padding: 24px 0;
  border-bottom: 1px solid var(--shell-line);

}
.sa-city:hover { background: rgba(63, 78, 142, 0.04); }
.sa-city-num {
  font-family: var(--font-heading); font-style: italic; font-weight: 600;
  font-size: 13px; color: var(--kc-indigo); opacity: .7;
}
.sa-city-name {
  font-family: var(--font-heading); font-weight: 700;
  font-size: 22px; color: var(--deep-ink); letter-spacing: -0.012em;
  line-height: 1.15;

  pointer-events: none;
}
.sa-city-distance {
  font-family: var(--font-heading); font-style: italic; font-weight: 600;
  font-size: 13px; color: var(--deep-ink); opacity: .55;
  text-align: right;
  letter-spacing: 0.01em;

  grid-template-columns: 28px minmax(0, 220px) minmax(0, 1fr) 96px;

  gap: 32px;
  padding: 12px 0;

}
.sa-cities-headrow > div:nth-child(4) { justify-self: end; }
.sa-cities-headrow > div:last-child   { text-align: right; }

@media (max-width: 900px) {
  .sa-hero-grid,
  .sa-region-head { grid-template-columns: 1fr; gap: 32px; }
  .sa-cities-headrow { display: none; }
  .sa-city {
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 24px 0;
  }
  .sa-city-num { display: none; }
  .sa-city-distance {
    text-align: left;
    order: 2;
  }
  .sa-city-name { order: 1; }
  .sa-city-note { order: 3; }
  .sa-city-links { justify-self: stretch; order: 4; }
  .sa-hero-meta { grid-template-columns: 1fr; }
  .sa-hero-meta-cell {
    border-right: 0;
    border-bottom: 1px solid var(--shell-line);
    padding: 20px 0 !important;
  }

/* CTA band specific to hub */

.sa-cta-grid {

        </div>

          <a className="kc-btn kc-btn-brass kc-btn-lg" href={kcHref(content.primary.href)}>{content.primary.label} <span className="kc-arrow">→</span></a>
          <a className="kc-btn kc-btn-ghost" href={content.secondary.href}>{content.secondary.label}</a>
        </div>
      </div>
    </div>
  </section>
);

// Helper — italicize() not exported globally from shared, so re-implement:
function italicize(plain, italic) {
  if (!italic || !plain) return plain || '';
  const idx = plain.lastIndexOf(italic);
  if (idx < 0) return <span>{plain} <em>{italic}</em></span>;
  return <span>{plain.slice(0, idx)}<em>{italic}</em></span>;
}

const Page = () => {
  const offsets = [];
  let acc = 0;
  CONTENT.regions.forEach(r => { offsets.push(acc); acc += r.cities.length; });
  return (
    <div className="kc-page">
      <KCNav active={null} />
      <KCBreadcrumbs content={CONTENT.breadcrumbs} />
      <SAHero content={CONTENT.hero} />
      {CONTENT.regions.map((r, i) => <SARegion key={i} region={r} indexOffset={offsets[i]} />)}
      <SANotes content={CONTENT.notes} />
      <SACta content={CONTENT.cta} />
      <KCFooter content={CONTENT.footer} />
    </div>
  );
};

KCSeo.apply(CONTENT.meta, {
  pageType:    "hub",
  pageUrl:     CONTENT.meta.canonical,
  breadcrumbs: CONTENT.breadcrumbs.items,
});

const renderWhenReady = () => {
  if (typeof KCNav === 'undefined') return setTimeout(renderWhenReady, 30);
  ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  requestAnimationFrame(() => { if (window.lucide) window.lucide.createIcons(); });
  setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 400);
};
renderWhenReady();
</script>

</body>
