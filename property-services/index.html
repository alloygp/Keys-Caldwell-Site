      <div className="kc-container">
        {c.eyebrow && <div className="kc-eyebrow">{c.eyebrow}</div>}
        <h2 className="kc-section-title">{c.titlePlain} <em>{c.titleItalic}</em></h2>
        <div className="kc-ps-process-list">
          {(c.items || []).map((it, i) => (
            <div className="kc-ps-process-step" key={i}>
              <div className="kc-ps-process-num">{it.num}</div>
              <div>
                <h3 className="kc-ps-process-h">{it.h}</h3>
                <div className="kc-ps-process-meta">{it.meta}</div>
              </div>
              <p className="kc-ps-process-p">{it.p}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

const KCPsDeliverables = ({ content }) => {
  const c = content || {};
  return (
    <section className="kc-ps-areas" style={{background: 'var(--kc-paper)'}}>
      <div className="kc-container">
        {c.eyebrow && <div className="kc-eyebrow">{c.eyebrow}</div>}
        <h2 className="kc-section-title">{c.titlePlain} <em>{c.titleItalic}</em></h2>
        <div className="kc-ps-areas-grid" style={{gridTemplateColumns: 'repeat(3, 1fr)'}}>
          {(c.items || []).map((it, i) => (
            <div className="kc-ps-area" key={i} style={{background: 'var(--kc-cream)'}}>
              <h3 className="kc-ps-area-h" style={{marginTop: 0}}>{it.h}</h3>
              <p className="kc-ps-area-p">{it.p}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

const Page = () => (
  <div className="kc-page">
    <KCNav active={CONTENT.nav.active} />
    <KCBreadcrumbs   content={CONTENT.breadcrumbs} />
    <KCPsHero        content={CONTENT.hero} />
    <KCPsAreas       content={CONTENT.areas} />
    <KCPsModels      content={CONTENT.models} />
    <KCPsProcess     content={CONTENT.process} />
    <KCPsDeliverables content={CONTENT.deliverables} />
    <KCFAQ           content={CONTENT.faq} />
    <KCQuote         content={CONTENT.quote} />
    <KCCtaBand       content={CONTENT.ctaBand} />
    <KCFooter        content={CONTENT.footer} />
  </div>
);

KCSeo.apply(CONTENT.meta, {
  pageType:    "service",
  pageUrl:     CONTENT.meta.canonical,
  breadcrumbs: CONTENT.breadcrumbs.items,
});

const renderWhenReady = () => {
  if (typeof KCNav === 'undefined') {
    return setTimeout(renderWhenReady, 30);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
  requestAnimationFrame(() => { if (window.lucide) window.lucide.createIcons(); });
  setTimeout(() => { if (window.lucide) window.lucide.createIcons(); }, 400);
};
renderWhenReady();
</script>

</body>
</html>
