const KCCaseFilter = ({ content, active, setActive }) => {
  const c = content || {};
  return (
    <section className="kc-casefilter">
      <div className="kc-container">
        <div className="kc-casefilter-inner">
          <div className="kc-casefilter-label">{c.label}</div>
          <div className="kc-casefilter-chips">
            {(c.chips || []).map((chip) => (
              <button key={chip.id}
                className="kc-casefilter-chip"
                aria-pressed={active === chip.id}
                onClick={() => setActive(chip.id)}>
                {chip.label}
              </button>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
};

const KCCaseList = ({ content, active }) => {

  const items = (c.items || []).filter((it) =>
    active === 'all' || it.category === active || (it.secondary || []).includes(active)
  );
  return (
    <section className="kc-caselist">
      <div className="kc-container">
        <div className="kc-caselist-grid">
          {items.map((it) => (
            <article className="kc-casecard" key={it.id}>
