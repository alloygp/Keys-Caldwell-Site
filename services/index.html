              {c.meta.map((m, i) => (
                <div className="sv-hero-meta-cell" key={i}>
                  <div className="sv-hero-meta-k">{m.k}</div>
                  <div className="sv-hero-meta-v">{m.v}</div>
                  <div className="sv-hero-meta-sub">{m.sub}</div>
                </div>
              ))}
            </div>
          </div>
          {c.photo && (
            <div className="sv-hero-photo">
              <img src={c.photo.src} alt={c.photo.alt} loading="eager" />
              <div className="sv-hero-photo-cap">{c.photo.caption}</div>
              <div className="sv-hero-photo-overlay">
                <div className="sv-hero-photo-overlay-eye">{c.photo.overlayEye}</div>
                <h2 className="sv-hero-photo-overlay-h">{c.photo.overlayH}</h2>
              </div>
            </div>
          )}
        </div>
      </div>
    </section>
  );

  const SVBreak = ({ content: c }) => (
    <section className="sv-break" aria-label="">
      <img src={c.src} alt={c.alt} loading="lazy" />
      <div className="sv-break-cap">
        <div className="kc-container">
          <div className="sv-break-cap-inner">
            <div>
              <div className="sv-break-eye">{c.eyebrow}</div>
              <h2 className="sv-break-h">{c.h}</h2>
            </div>
            <div className="sv-break-loc">{c.loc}</div>
          </div>
        </div>
      </div>
    </section>
  );

  const SVPillarTiles = ({ content: c }) => (
    <section className="sv-pillars">
      <div className="kc-container">
        <div className="sv-pillars-head">
          <div className="kc-eyebrow">{c.eyebrow}</div>
          <h2 className="sv-pillars-h">
            {c.titlePlain} <em>{c.titleItalic}</em>
          </h2>
        </div>
        <div className="sv-pillars-grid">
          {c.tiles.map((t, i) => (
            <a key={i} className="sv-pillar" href={kcHref(t.href)}>
              <div className="sv-pillar-n">{t.n}</div>
              <h3 className="sv-pillar-label">{t.label}</h3>
              <p className="sv-pillar-blurb">{t.blurb}</p>
              <div className="sv-pillar-meta">{t.meta}</div>
              <div className="sv-pillar-cta">
                Read more <span aria-hidden="true">→</span>
              </div>
            </a>
          ))}
        </div>
      </div>
    </section>
  );

  const SVHowEngagement = ({ content: c }) => (
    <section className="sv-how">
      <div className="kc-container">
        <div className="sv-how-head">
          <div className="kc-eyebrow">{c.eyebrow}</div>
          <h2 className="sv-how-h">
            {c.titlePlain} <em>{c.titleItalic}</em>
          </h2>
          <hr className="sv-how-rule" />
        </div>
        <div className="sv-how-grid">
          <aside className="sv-how-aside">
            <p className="sv-how-aside-p">{c.asideP}</p>
            <a className="sv-how-aside-link" href={kcHref(c.asideLink.href)}>
              {c.asideLink.label} <span aria-hidden="true">→</span>
            </a>
          </aside>
          <ol className="sv-how-steps">
            {c.steps.map((s, i) => (
              <li className="sv-how-step" key={i}>
                <div className="sv-how-step-n">{s.n}</div>
                <div>
                  <h3 className="sv-how-step-t">{s.t}</h3>
                  <p className="sv-how-step-p">{s.p}</p>
                </div>
              </li>
            ))}
          </ol>
        </div>
      </div>
    </section>
  );

  const SVNotIncluded = ({ content: c }) => (
    <section className="sv-not">
      <div className="kc-container">
        <div className="sv-not-head">
          <div className="kc-eyebrow">{c.eyebrow}</div>
          <h2 className="sv-not-h">
            {c.titlePlain} <em>{c.titleItalic}</em>
          </h2>
          <hr className="sv-not-rule" />
        </div>
        <div className="sv-not-grid">
          <div>
            <p className="sv-not-lede">{c.lede}</p>
          </div>
          <ul className="sv-not-list">
            {c.items.map((it, i) => (
              <li className="sv-not-item" key={i}>
                <strong>{it.t}</strong>
                <span>{it.p}</span>
              </li>
            ))}
          </ul>
        </div>
      </div>
    </section>
  );

  // ─────────────────── App ────────────────────────────────
  const App = () => {
    useEffect(() => {
      if (window.lucide) lucide.createIcons();
    }, []);
    return (
      <>
        <KCNav            content={CONTENT.nav} />
        <KCBreadcrumbs    items={CONTENT.breadcrumbs} />
        <SVHero           content={CONTENT.hero} />
        <SVPillarTiles    content={CONTENT.pillars} />
        <SVBreak          content={CONTENT.breakImage} />
        <SVHowEngagement  content={CONTENT.how} />
        <SVNotIncluded    content={CONTENT.notIncluded} />
        <KCCtaBand        content={CONTENT.ctaBand} />
        <KCFooter         content={CONTENT.footer} />
      </>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
