    title: "Reserve Studies & Special Assessments — How to Stop Surprises Before They Happen",
    subtitle: "Special assessments rarely happen because of bad luck. They happen because the reserve study told the board what was coming, and the board didn't act in time. Here's how to read your reserve study, and what funding plan to actually adopt.",
    publishedDisplay: "April 8, 2026",
    updatedDisplay: "April 29, 2026",
    readTime: "12 min read",
    author: { initials: "DC", name: "Daniel Caldwell", role: "Operations Principal · Capital Projects Lead" },
    tldrLabel: "Answer-first",
    tldr: "A reserve study is a financial forecast of every major capital component your association owns — roof, paving, pool, mechanical, structural — with replacement cost and remaining useful life. A special assessment is what happens when the forecast was right but the funding plan wasn't followed. Boards that update the study annually, fund 70%+ of recommended reserves, and act on findings rarely face surprise assessments.",

  body: { sections: [
    { id: "what-is", h2: "What a reserve study actually is", blocks: [
      { type: "p", text: "A reserve study is a long-range capital forecast. It identifies every major component the association is responsible for replacing or refurbishing, estimates how long each component will last, projects what it will cost to replace, and lays out a funding schedule that puts enough money aside, every year, to pay for those replacements when they come due." },
      { type: "p", text: "It is, in essence, the association's 30-year financial plan compressed into a single document. Done well, it removes virtually all surprise from capital expenditure. Done poorly — or not done at all — it sets the board up to discover, after the fact, that they should have been saving twice as much for the past decade." },
      { type: "callout", kind: "note", title: "SIRS vs. reserve study",
        text: "For Florida condominiums three stories or higher, the Structural Integrity Reserve Study (SIRS) is a statute-mandated subset of the broader reserve study, focused on 10 specific structural components and waiver-prohibited. A complete reserve study includes the SIRS plus everything else the association owns. The SIRS is required; the broader reserve study is best practice." },
    ]},
    { id: "components", h2: "Components and useful life", blocks: [
      { type: "p", text: "Every component has three numbers attached to it: useful life (how long it lasts when new), remaining useful life (how long until replacement), and current replacement cost (today's dollars). The reserve study walks every line item." },
      { type: "h3", text: "Typical component categories" },
      { type: "ul", items: [
        "Structural — roof, façade, balconies, post-tension cables, structural concrete, foundation.",
        "Building envelope — windows, exterior doors, waterproofing, exterior paint.",
        "Mechanical — elevators, HVAC, generators, fire systems, plumbing risers, electrical service.",
        "Site — paving, sidewalks, retaining walls, drainage, landscaping hardscape, fencing.",
        "Amenity — pool resurfacing, pool equipment, deck refurbishment, clubhouse interior, gym equipment, dock structure.",
        "Other — signage, irrigation, lighting, mailboxes.",
      ]},
      { type: "p", text: "Useful-life numbers come from engineering experience and manufacturer specifications, but they are estimates — actual useful life on the Sarasota County coast is often shorter than the textbook figure because of salt exposure, UV intensity, and storm cycles. A good reserve specialist adjusts the textbook numbers for your building's actual conditions." },
    ]},
    { id: "funding", h2: "The four funding methods", blocks: [
      { type: "p", text: "The reserve study can present a funding plan in one of four ways. The choice the board makes determines how much each owner pays into reserves each year." },
      { type: "ol", items: [
        "Full-funding (100%) — the reserve balance equals the accumulated useful-life depreciation of every component at every point in time. Conservative, expensive, and audit-bulletproof.",
        "Threshold funding (typically 70%) — reserves stay above a minimum percentage of full-funding at all times. The most common method in Florida condominium practice.",
        "Cash-flow funding — the reserve balance is whatever it needs to be to fund actual scheduled expenditures, with a small buffer. Lower contributions but tolerates much lower balances; works only with very accurate timing forecasts.",
        "Baseline funding — reserves never go below zero. The bare-minimum method; not recommended for any building with significant structural or coastal exposure.",
      ]},
      { type: "callout", kind: "pivot", title: "We recommend threshold funding at 70% or above for coastal condos.",
        text: "Cash-flow funding looks economical until a hurricane shifts the schedule by 18 months, an unexpected component fails early, or the milestone inspection finds something. Threshold funding gives the board a buffer; it also signals to insurance carriers and prospective buyers that the building is being responsibly capitalized." },
    ]},
    { id: "underfunded", h2: "Why associations end up under-funded", blocks: [
      { type: "h3", text: "Stale reserve studies" },
      { type: "p", text: "A reserve study is a snapshot of conditions at the time of the site walk. Roofs deteriorate; mechanical equipment ages out faster than expected; coatings fail. A study that's 6 years old is, in operational terms, fiction. The numbers in the spreadsheet have drifted from physical reality." },
      { type: "h3", text: "Owner waiver of reserves" },
      { type: "p", text: "Pre-SB-4D, condominium owners could vote by majority to waive reserves below the recommended level. Many did, year after year, accumulating a structural under-funding gap that compounded. SB-4D removed waiver for the SIRS-defined components, but the historical gap remains in many buildings." },
      { type: "h3", text: "Inflation tracking" },
      { type: "p", text: "Replacement costs in a reserve study should be re-priced every annual update. Construction cost inflation has run 5–9% annually for several years on the Sarasota County coast. A reserve study that hasn't been re-priced since 2021 is materially under-stating tomorrow's bill." },
      { type: "h3", text: "Components missing from the study" },
      { type: "p", text: "Some studies are scoped narrowly to keep the sticker price low. Components that should have been listed — generator overhauls, fire alarm panel replacement, dock pile sleeves — are simply absent from the schedule. They show up later as 'unbudgeted' expenditures." },
    ]},
    { id: "special", h2: "When special assessments are needed", blocks: [
      { type: "p", text: "A special assessment is a one-time charge to all owners, beyond regular assessments, to fund a specific expenditure the operating budget and reserves cannot cover. Florida statute permits them; declarations typically govern the procedure. Special assessments are needed when:" },
      { type: "ul", items: [
        "An emergency — hurricane damage in excess of insurance coverage, sudden structural failure.",
        "A milestone-inspection finding requires major remediation on a short timeline.",
        "Reserve under-funding meets a component that won't wait — typically roof or mechanical.",
        "An insurance settlement falls short of repair cost.",
      ]},
      { type: "p", text: "Special assessments are not, in themselves, a sign of mismanagement — emergencies happen. But repeated or large special assessments almost always indicate that the reserve study was either stale, underfunded, or scoped too narrowly. The pattern is what to watch." },
      { type: "h3", text: "Owner notice and approval" },
      { type: "p", text: "The procedure for adopting a special assessment varies by declaration. Most Florida condominium declarations require a duly-noticed board meeting, with owners given the right to attend; some require owner approval above a threshold. Confirm the procedure with your association's counsel before voting." },
    ]},
    { id: "story", h2: "Case study: how we averted a $1.2M assessment", blocks: [
      { type: "p", text: "A 32-unit coastal condominium came to Keys-Caldwell in 2022 after their previous management firm had neither updated the reserve study in 5 years nor flagged that the building's post-tension cables were aging into the failure window. Our intake review identified the gap within the first 60 days." },
      { type: "p", text: "Working with the board and an engineering firm, we performed a building-condition assessment and re-ran the reserve study with current pricing and corrected timing. The result: a $1.2M post-tension cable program coming due in roughly 36 months, against a reserve balance that would have covered approximately 30% of it." },
      { type: "p", text: "Rather than a six-figure special assessment, the board adopted a phased plan: a multi-year reserve contribution increase, a partial draw on a reserve credit facility, and a deferred-maintenance schedule that pushed two non-critical projects out by 24 months to free up reserve capacity. The cable replacement was funded entirely through reserves and assessment increases — no special assessment was levied." },
      { type: "callout", kind: "note", title: "The lesson is the lead time, not the cleverness.",
        text: "Nothing about the financial plan was exotic. The difference between a $1.2M special assessment and a calmly-funded multi-year capital plan was 36 months of advance notice. That notice came from updating the reserve study, not from any specific financial maneuver." },
      { type: "pillar-link", href: "/reserve-studies/", label: "Our reserve study practice",
        context: "How reserve-study continuum coordinates engineering, pricing, and board communication." },
    ]},
    { id: "subscription", h2: "The subscription model", blocks: [
      { type: "p", text: "Most associations historically commission a reserve study every 3–5 years, treating it as a periodic engineering deliverable. We've moved most of our portfolio to an annual subscription model — the study is updated every year, with quarterly check-ins on capital projects in flight." },
      { type: "h3", text: "Why subscription" },
      { type: "ul", items: [
        "Pricing tracks inflation continuously, not in 5-year jumps.",
        "Components that get repaired ahead of schedule (or fail early) show up in the funding plan within a quarter, not a half-decade.",
        "The board sees the same reserve specialist for multiple years — institutional context is preserved.",
        "The annual cost is materially lower than running the full study from scratch every 5 years.",
      ]},
      { type: "p", text: "Annual subscription is a working relationship, not a deliverable. It's also the model insurance carriers and lenders increasingly prefer when underwriting." },
    ]},
    { id: "faq", h2: "Quick-answer FAQ", blocks: [
      { type: "h3", text: "How much should we have in reserves?" },
      { type: "p", text: "Threshold-funded at 70%+ of full-funded, with regular updates, is the practical target for most coastal condominiums. Less than 50% threshold is a structural risk; less than 30% is a special-assessment-in-waiting." },
      { type: "h3", text: "Who can perform a reserve study?" },
      { type: "p", text: "Florida statute permits associations to use a credentialed reserve specialist (typically RS or PRA designation) or a licensed engineer. For SIRS-specific components, an engineer is required. Most quality studies for coastal condos involve both." },
      { type: "h3", text: "Can we use reserves for operating expenses?" },
      { type: "p", text: "Generally no, without owner approval. Reserve funds are restricted by statute and most declarations to the components for which they were collected. Borrowing from reserves for operating purposes — even short-term — typically requires owner vote and is operationally inadvisable." },
      { type: "h3", text: "What happens if we never adopt the reserve study's recommendations?" },
      { type: "p", text: "The board has fiduciary obligations to the association. A board that ignores a reserve study's recommendations year after year, and the association then faces a foreseeable special assessment, has a documented governance problem. Insurance carriers, prospective buyers, and (in extreme cases) plaintiffs' counsel will eventually find that documentation." },
      { type: "callout", kind: "warning", title: "Not legal advice",
        text: "This article is operational guidance from a community association management firm. Florida reserve and assessment law is specific and your declaration controls. Consult your association's legal counsel before adopting a special assessment." },
    ]},
  ]},
