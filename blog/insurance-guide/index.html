  header: {
    eyebrow: "Insurance · Risk management",
    title: "Florida Association Insurance — Why Carriers Ask for SIRS Reports, and How to Keep Your Policy Renewing",
    subtitle: "Florida's coastal condo insurance market has changed permanently. Here's what every board should understand about how carriers underwrite associations now — and the operational practices that determine whether your master policy renews.",
    publishedDisplay: "April 14, 2026",
    updatedDisplay: "April 30, 2026",
    readTime: "10 min read",
    author: { initials: "LW", name: "Lauren Wilson", role: "President · Keys-Caldwell" },
    tldrLabel: "Answer-first",
    tldr: "Florida association insurance carriers now evaluate associations on three dimensions: (1) building condition documentation — milestone inspection, SIRS, deferred maintenance schedule; (2) financial controls — reserves, audit, claims history; (3) operational maturity — management firm, vendor records, board governance. Associations that document well renew at favorable terms; associations that don't may face non-renewal regardless of premium.",

  toc: { items: [
    { id: "market",      label: "How the market changed" },
    { id: "policies",    label: "What policies an association carries" },
    { id: "underwriting", label: "What carriers want to see" },

    { id: "claims",      label: "Claims handling and renewal impact" },

    { id: "faq",         label: "Quick-answer FAQ" },

  body: { sections: [
    { id: "market", h2: "How the market changed", blocks: [
      { type: "p", text: "The Florida coastal property insurance market has gone through three structural shocks since 2021: the Surfside collapse and resulting regulatory tightening, multiple severe hurricane seasons, and a sustained period of carrier withdrawals from the state. The result, in operational terms: fewer carriers writing master policies, higher premiums, stricter underwriting, and far more documentation required at renewal." },
      { type: "p", text: "Carriers that remain in the market have, broadly, adopted the same underwriting posture: associations that look professionally managed and structurally documented get terms; associations that don't get either non-renewed or quoted at premiums that effectively force them off the carrier." },
      { type: "callout", kind: "note", title: "This is not a rate problem. This is a documentation problem.",
        text: "Many board members assume the issue is premium. The deeper issue is that some associations are no longer insurable on the open market at any premium because their underwriting submission tells the carrier the building is unmanaged. The fix is operational, not financial." },
    ]},
    { id: "policies", h2: "What policies an association carries", blocks: [
      { type: "p", text: "A typical Florida community association master insurance program consists of several distinct policies, often placed with several carriers." },
      { type: "ul", items: [
        "Master property policy — covers the building structure and common-area contents. For condos, this typically includes everything from the studs out (the \"all-in\" or \"original spec\" definitions vary by declaration).",
        "General liability — covers the association's liability for injury or property damage on common property.",
        "Directors & Officers (D&O) — covers board members for governance-related claims.",
        "Crime / fidelity bond — covers theft of association funds. Florida statute requires minimum coverage tied to operating funds and reserves.",
        "Wind / hurricane — sometimes a separate policy, sometimes a wind-deductible rider on the master property.",
        "Flood — federal NFIP base policy plus, often, an excess-flood layer on coastal buildings.",
        "Workers compensation — required if the association has employees.",
        "Umbrella — excess limits over multiple underlying policies.",
      ]},
      { type: "p", text: "Each policy has its own underwriting, its own renewal cycle, and its own paperwork. The board's broker is responsible for orchestrating renewal across all of them; the management firm is responsible for providing the operational documentation each underwriter wants." },
    ]},
    { id: "underwriting", h2: "What carriers want to see", blocks: [
      { type: "p", text: "When the broker submits your renewal package to a carrier, the underwriter is looking for specific documents that signal the association is being run responsibly. The list, in roughly the order they're checked:" },
      { type: "h3", text: "Building condition" },
      { type: "ul", items: [
        "Current milestone inspection (Phase One report) for any building 25+/30+ years old.",
        "Current Structural Integrity Reserve Study (SIRS) for condos three stories and higher.",
        "Recent roof age and condition documentation.",
        "Updated wind-mitigation form (1802) — straps, openings, secondary water resistance.",
        "Documented status of any open code-compliance items.",
      ]},
      { type: "h3", text: "Financial position" },
      { type: "ul", items: [
        "Current reserve balance and reserve study.",
        "Most recent audited or reviewed financial statements.",
        "Loss history — every claim filed in the past 5 years with status and resolution.",
        "Operating budget showing reserve contributions actually being funded.",
      ]},
      { type: "h3", text: "Operational maturity" },
      { type: "ul", items: [
        "Management firm name, license, tenure on the account.",
        "Board governance — meeting cadence, minutes maintained, election procedures followed.",
        "Vendor maintenance records — life-safety inspections, elevator certifications, fire system testing.",
        "Documented preventive maintenance program.",
      ]},
      { type: "callout", kind: "pivot", title: "The underwriter is asking one question.",
        text: "Across all of this paperwork, the underwriter is asking one question: when something goes wrong on this property, will it be discovered, documented, and addressed by people who know what they're doing — or will it become a claim? Every document on the list is a piece of evidence." },
    ]},
    { id: "premium", h2: "Premium drivers and what's controllable", blocks: [
      { type: "p", text: "Some premium drivers are out of the board's control: location, hurricane exposure, building age, construction type, occupancy density. The list of controllable drivers is shorter but real:" },
      { type: "ul", items: [
        "Wind-mitigation features and current 1802 form — concrete impact on premium.",
        "Roof age and condition.",
        "Documented preventive maintenance — particularly plumbing risers, mechanical equipment, fire suppression.",
        "Reserve funding level — under-funded reserves correlate with deferred maintenance, which correlates with claims.",
        "Loss history — frequency matters more than severity. Three small water claims do more renewal damage than one larger claim with a documented root cause and remediation.",
        "Choice of broker — coastal-association-specialist brokers get better terms than generalists, because they know which carriers are still writing what risks.",
      ]},
      { type: "h3", text: "Deductibles" },
      { type: "p", text: "Wind deductibles on Florida coastal master policies are typically 5% of insured value (sometimes higher), often hundreds of thousands of dollars. The board should understand exactly how the deductible would be funded if a hurricane hits — usually a combination of reserves and a special assessment. This is also why a healthy reserve balance correlates with insurance favorability." },
    ]},
    { id: "claims", h2: "Claims handling and renewal impact", blocks: [
      { type: "p", text: "How a claim is handled in real time has direct consequences for renewal. Common mistakes:" },
      { type: "ul", items: [
        "Filing claims for losses below the realistic deductible — adds to loss history without producing a payout.",
        "Filing without documentation — photos, vendor reports, repair estimates. Claims that can't be substantiated drag through adjustment for months and signal disorganization.",
        "Failing to mitigate — Florida policies require the association to take reasonable steps to prevent further damage. Inadequate mitigation can reduce or void coverage.",
        "Settling without root-cause documentation — the carrier closes the claim, but the next renewal asks 'what did you fix?' and there's no answer.",
      ]},
      { type: "p", text: "Good claims handling: prompt documentation, prompt mitigation, broker-led adjuster coordination, and a written root-cause-and-remediation summary attached to the claim file. The same losses, handled this way, produce far less renewal friction." },
    ]},
    { id: "story", h2: "Case study: insurance-driven roof replacement", blocks: [
      { type: "p", text: "A 24-unit coastal condominium came up for master-policy renewal in 2024 with a 19-year-old shingle roof. The renewing carrier indicated that the roof age was approaching their underwriting threshold and that next year's renewal would be conditional on roof replacement or significant premium increase." },
      { type: "p", text: "Working with the board, we proactively replaced the roof during the off-season — 11 months before the next renewal cycle — using reserves rather than a special assessment. The new roof, with updated wind-mitigation features, became the centerpiece of the next renewal submission." },
      { type: "p", text: "Result: the carrier renewed at favorable terms, with a wind-mitigation credit that offset much of the project cost over the renewal cycles that followed. Total insurance savings over 5 years approached the cost of the replacement itself, leaving the building with a new roof effectively at break-even." },
      { type: "callout", kind: "note", title: "Insurance is a forecast.",
        text: "Boards that treat insurance renewal as a once-a-year event leave money on the table. Boards that work backward from next year's underwriting submission — and align capital projects to the renewal cycle — get materially better terms over time." },
      { type: "pillar-link", href: "/condo-association-management-sarasota/", label: "Condo association management",
        context: "How Keys-Caldwell coordinates insurance, capital projects, and reserves as a single program." },
    ]},
    { id: "faq", h2: "Quick-answer FAQ", blocks: [
      { type: "h3", text: "Why does my premium keep going up?" },
      { type: "p", text: "Three drivers, in roughly this order: state-wide rate increases, building-specific risk factors visible in the underwriting submission, and loss history. The first is out of your control; the second two largely are." },
      { type: "h3", text: "Should we shop our policy every year?" },
      { type: "p", text: "Annual market checks are wise; annual carrier changes typically aren't. Carriers price loyalty in. A 3-year cycle of broker market-checks, with carrier changes only when terms diverge meaningfully, is the practical pattern." },
      { type: "h3", text: "What's the right broker for an association?" },
      { type: "p", text: "A broker with a deep book of Florida community associations — not a generalist commercial-lines broker. The carriers writing this risk are a smaller pool than for general commercial property; specialists know who's quoting and at what terms." },
      { type: "h3", text: "What if our carrier non-renews?" },
      { type: "p", text: "Don't panic, and don't assume the next quote is going to be punishing. A non-renewal is sometimes a portfolio move by the carrier (they're exiting a class of business) and not a judgment on your specific risk. A specialist broker can usually find a market — but the underwriting submission needs to be airtight." },
      { type: "callout", kind: "warning", title: "Not insurance advice",
        text: "This article is operational guidance from a community association management firm. Specific coverage and policy terms should be reviewed with your broker and association counsel." },
    ]},
  ]},
