    title: "What Does a Community Association Management Company Actually Do?",
    subtitle: "If you're new to a board — or considering hiring a management firm for the first time — here's a complete walk-through of what these firms do, what they don't, and what a typical month looks like in practice.",
    publishedDisplay: "March 22, 2026",
    updatedDisplay: "April 26, 2026",
    readTime: "11 min read",
    author: { initials: "LW", name: "Lauren Wilson", role: "President · Keys-Caldwell" },
    tldrLabel: "Answer-first",
    tldr: "A community association management company runs the day-to-day operations of an HOA or condo association on behalf of its volunteer board: financial management (bookkeeping, billing, audits), vendor coordination (landscapers, maintenance, repairs), governance support (board meetings, minutes, compliance), and capital project oversight. The board sets policy and approves major decisions; the management firm executes.",

    { id: "faq",          label: "Quick-answer FAQ" },

  body: { sections: [
    { id: "role", h2: "The board-management relationship", blocks: [
      { type: "p", text: "Florida community associations are governed by elected volunteer boards. The board has fiduciary authority over the association's affairs — they hire vendors, approve budgets, set policy, enforce rules. They are also, almost always, busy people with day jobs. A management company is what makes the volunteer-board model practical at scale." },
      { type: "p", text: "The cleanest way to think about the relationship: the board is the executive function (decisions, policy, fiduciary oversight); the management firm is the operating function (execution, documentation, vendor coordination, financial bookkeeping). The licensed Community Association Manager (CAM) assigned to your community is the principal point of contact." },
      { type: "callout", kind: "note", title: "Self-management vs. professional management",
        text: "Florida law allows associations to self-manage — the board handles everything internally. This works for small, simple, low-amenity HOAs with stable populations and willing volunteers. It rarely works for condominiums, larger HOAs, or anything with significant capital exposure. The legal compliance burden alone (statutes 718 and 720, plus SB-4D for condos) makes professional management functionally necessary above 30–40 units." },
    ]},
    { id: "financial", h2: "Financial management", blocks: [
      { type: "p", text: "Financial management is the heart of what a management firm does. The major workstreams:" },
      { type: "h3", text: "Bookkeeping" },
      { type: "ul", items: [
        "Maintain the general ledger on accrual-basis fund accounting.",
        "Code every transaction to the appropriate account and fund.",
        "Reconcile every bank account monthly within 15 days of close.",
        "Produce the monthly financial packet for the board.",
      ]},
      { type: "h3", text: "Assessment billing and collection" },
      { type: "ul", items: [
        "Send monthly or quarterly assessment statements to owners.",
        "Process owner payments via portal, ACH, mail, or lockbox.",
        "Track aged receivables; send delinquency notices per association policy.",
        "Coordinate with attorney for liens and legal collection escalation.",
      ]},
      { type: "h3", text: "Budgeting and tax" },
      { type: "ul", items: [
        "Build the annual operating budget with the board's input.",
        "Run reserve scenario analyses against the reserve study.",
        "Coordinate with the CPA for the annual audit, review, or compilation.",
        "File the association's federal and state tax returns (Form 1120-H or 1120).",
      ]},
      { type: "pillar-link", href: "/accounting/", label: "Our accounting practice",
        context: "How CityBooks runs association accounting in-house — and why most firms outsource it." },
    ]},
    { id: "vendor", h2: "Vendor and operations management", blocks: [
      { type: "p", text: "The physical operation of the property — maintaining the grounds, fixing what breaks, keeping life-safety systems certified — runs through the management firm. The major workstreams:" },
      { type: "h3", text: "Vendor coordination" },
      { type: "ul", items: [
        "Solicit and evaluate bids for recurring service contracts (landscaping, pest, pool, janitorial).",
        "Manage one-off repair work — solicit quotes, recommend, supervise.",
        "Verify vendor licenses, insurance, and W-9s on file.",
        "Process vendor invoices through accounts payable.",
      ]},
      { type: "h3", text: "Property inspections" },
      { type: "ul", items: [
        "Manager site visits at the contracted cadence.",
        "Walk the property to identify maintenance issues before they become claims.",
        "Coordinate with vendors for repairs.",
        "Document property condition for insurance underwriting.",
      ]},
      { type: "h3", text: "Life-safety and compliance" },
      { type: "ul", items: [
        "Track required inspections — fire alarm, sprinkler, elevator, generator, backflow, pool.",
        "Coordinate with vendors for testing and certification.",
        "Maintain inspection records for insurance and regulatory review.",
      ]},
      { type: "h3", text: "Emergencies" },
      { type: "ul", items: [
        "After-hours emergency response — typically through an on-call manager or service line.",
        "Hurricane preparation and post-storm coordination.",
        "Insurance claim filing and documentation.",
      ]},
    ]},
    { id: "governance", h2: "Governance and compliance", blocks: [
      { type: "p", text: "Florida community associations operate under specific statutes and their own governing documents. Compliance is a major workstream." },
      { type: "h3", text: "Board meetings" },
      { type: "ul", items: [
        "Prepare and post meeting notice per statute (typically 48 hours, or 14 days for budget meetings).",
        "Build the board package — financials, manager report, action items, attachments.",
        "Attend the meeting; present the manager report; document discussions.",
        "Draft and circulate minutes; maintain the minute book.",
      ]},
      { type: "h3", text: "Annual meeting and elections" },
      { type: "ul", items: [
        "Coordinate the annual meeting per the declaration's procedures.",
        "Manage candidate qualification and ballot preparation.",
        "Run the election (or coordinate with an election service for larger communities).",
        "Document quorum, vote tallies, and outcomes.",
      ]},
      { type: "h3", text: "Records and statutory compliance" },
      { type: "ul", items: [
        "Maintain official records per statute — meeting minutes, financials, contracts, correspondence.",
        "Respond to records requests within statutory timelines.",
        "Coordinate with association counsel on legal questions.",
        "Coordinate with the insurance broker on master-policy renewal.",
      ]},
      { type: "h3", text: "Rules enforcement" },
      { type: "ul", items: [
        "Process violation reports per association rules.",
        "Send notice and conduct fining hearings per declaration.",
        "Coordinate architectural review committee functions.",
      ]},
    ]},
    { id: "capital", h2: "Capital project oversight", blocks: [
      { type: "p", text: "Capital projects — roof replacement, exterior painting, milestone-inspection-driven concrete restoration, pool refurbishment — are typically the largest expenditures an association makes. Management firms coordinate them, though the depth of involvement varies dramatically by firm." },
      { type: "ul", items: [
        "Engage engineers or architects for scope development.",
        "Build the RFP and solicit contractor bids.",
        "Vet contractors — license, insurance, references, financial stability.",
        "Recommend to the board; manage the procurement process.",
        "Supervise execution — site walks, change-order review, draw-schedule approval.",
        "Coordinate with the engineer on substantial-completion determination.",
        "Manage punch-list closeout and warranty documentation.",
      ]},
      { type: "callout", kind: "pivot", title: "Capital project oversight is where firms diverge most.",
        text: "A small management firm without an in-house construction-knowledgeable principal effectively becomes a paperwork shuffler on a major project — which is when boards get most exposed. A firm with capital-project expertise (or, in our case, a dedicated Property Services division) is operationally a different product." },
      { type: "pillar-link", href: "/property-services/", label: "Our Property Services division",
        context: "How we run capital projects in-house instead of subcontracting them." },
    ]},
    { id: "owner", h2: "Owner-facing services", blocks: [
      { type: "p", text: "Owners interact with the management firm constantly — far more than they interact with the board. The owner experience is, in operational terms, the management firm's product." },
      { type: "ul", items: [
        "Owner portal — pay assessments, submit requests, view documents, sign architectural applications.",
        "Phone and email support — typically with a published response-time SLA.",
        "New owner welcome packets — declaration, rules, payment instructions.",
        "Estoppel certificates for sales and refinances.",
        "Transfer-of-ownership documentation.",
        "Lender questionnaires for unit financing.",
        "Resident communication — newsletters, notices, emergency alerts.",
      ]},
    ]},
    { id: "doesnt-do", h2: "What a management company doesn't do", blocks: [
      { type: "p", text: "Equally important: what's outside scope. Management firms are not law firms, accounting firms, insurance brokers, or general contractors. They coordinate with each of those, but they don't replace them." },
      { type: "ul", items: [
        "Legal counsel — interpretation of declaration, litigation, statutory questions. Association counsel handles this.",
        "Audit / tax filings — coordinated with the CPA, but the CPA signs the work product.",
        "Insurance procurement — coordinated with the broker, who sources carriers and binds coverage.",
        "Major construction work — coordinated, but performed by licensed contractors.",
        "Reserve study engineering — coordinated, performed by reserve specialists.",
        "Owner-unit interior issues — those belong to the owner, not the association.",
      ]},
      { type: "p", text: "A firm that claims to do all of this in-house is either misrepresenting scope or running outside the lines of their professional licensing. The right model is a coordinated team — the management firm is the conductor, not every musician." },
    ]},
    { id: "faq", h2: "Quick-answer FAQ", blocks: [
      { type: "h3", text: "What's a CAM?" },
      { type: "p", text: "Community Association Manager — a Florida state license required for anyone managing an association of 11+ units or with an annual budget over $100,000 (with limited exceptions). The license is administered by the Department of Business and Professional Regulation and requires continuing education." },
      { type: "h3", text: "What's the difference between an HOA and a condo association?" },
      { type: "p", text: "Operationally, very similar. Statutorily, different — HOAs operate under Chapter 720 (the Homeowners Association Act); condominiums operate under Chapter 718 (the Condominium Act). The day-to-day differences boil down to ownership structure (HOAs typically own homes plus common areas; condos own units within shared structures), reserve obligations (condos now have SIRS), and member-vote thresholds." },
      { type: "h3", text: "Can our board ever override the management firm?" },
      { type: "p", text: "Always. The board has fiduciary authority; the management firm is an agent of the board. If the board votes to do something the firm advises against, the firm executes the board's decision (or, in extreme cases, declines the engagement). The board is the principal." },
      { type: "h3", text: "How quickly should the management firm respond to me?" },
      { type: "p", text: "The contract should specify SLAs — typically 24–48 hours for non-emergency owner inquiries. After-hours emergency response should be one-hour or less for genuine emergencies (water intrusion, lockouts, life-safety failures). Non-emergency means non-emergency." },
      { type: "callout", kind: "warning", title: "Not legal advice",
        text: "This article is operational guidance from a community association management firm, not legal advice. Florida community association statutes and your governing documents control specific scope and authority questions." },
    ]},
  ]},
