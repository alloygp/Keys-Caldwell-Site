    title: "What HOA & Condo Management Fees Actually Cover — And Why the Cheapest Bid Is Rarely the Cheapest Contract",
    subtitle: "Most boards comparing management proposals look at the monthly fee. The actually-meaningful number is what's IN that fee — and what gets billed separately. Here's how to read a proposal so you can compare.",
    publishedDisplay: "March 28, 2026",
    updatedDisplay: "April 27, 2026",
    readTime: "9 min read",
    author: { initials: "LW", name: "Lauren Wilson", role: "President · Keys-Caldwell" },
    tldrLabel: "Answer-first",
    tldr: "Florida HOA and condo management fees typically range from $18–$45 per unit per month, depending on building type, services included, and complexity. The headline fee is meaningless without scope: a $20/unit proposal that excludes board meetings, capital project oversight, and reserve coordination is more expensive than a $35/unit proposal that includes them. Compare scope first, then price.",

  toc: { items: [
    { id: "models",      label: "How fees are typically structured" },

    { id: "addon",       label: "What's commonly billed separately" },

    { id: "faq",         label: "Quick-answer FAQ" },

  body: { sections: [
    { id: "models", h2: "How fees are typically structured", blocks: [
      { type: "p", text: "Florida community association management fees are usually structured one of three ways:" },
      { type: "ol", items: [
        "Per-unit-per-month — the most common. The fee scales with the size of the community: $25 PUPM × 60 units = $1,500/month base.",
        "Flat monthly — a fixed dollar amount regardless of unit count. Common for small communities (under 30 units) where the per-unit math becomes punitively low.",
        "Hybrid / scope-based — a flat base plus variable adjustments for specific services. Less common, but increasingly used for communities with unusual operational complexity.",
      ]},
      { type: "p", text: "Per-unit pricing is conventional but obscures the actual cost driver: time. A 60-unit coastal mid-rise with a SIRS, three vendor contracts in active disputes, and a year-end audit needs more management hours than a 60-unit single-story HOA with minimal common area. Per-unit pricing can dramatically under-price the first community and over-price the second." },
    ]},
    { id: "included", h2: "What should be included in a baseline fee", blocks: [
      { type: "p", text: "Most reputable Florida management proposals include the following in the base monthly fee. If a proposal excludes any of these, that's not a cheaper bid — it's a different scope." },
      { type: "h3", text: "Operational management" },
      { type: "ul", items: [
        "Licensed CAM (Community Association Manager) assigned to the community.",
        "Manager site visits at a specified cadence (commonly bi-weekly or monthly).",
        "Vendor coordination — soliciting quotes, managing service providers, paying invoices.",
        "Owner inquiry response — phone, email, portal — within published SLAs.",
        "Compliance monitoring — architectural review, rules enforcement, fining process.",
      ]},
      { type: "h3", text: "Financial management" },
      { type: "ul", items: [
        "Monthly bookkeeping and bank reconciliation.",
        "Monthly financial packet delivered to the board.",
        "Assessment billing and collection (initial demand letters; legal escalation usually billed separately).",
        "Annual budget preparation in coordination with the board.",
        "Year-end close and CPA coordination for the audit/review/compilation.",
      ]},
      { type: "h3", text: "Governance support" },
      { type: "ul", items: [
        "Board meeting attendance — typically 12 monthly meetings plus the annual meeting.",
        "Meeting notice preparation and posting.",
        "Minutes drafting and minute book maintenance.",
        "Records retention per statute.",
        "Insurance renewal coordination (with broker).",
      ]},
    ]},
    { id: "addon", h2: "What's commonly billed separately", blocks: [
      { type: "p", text: "These items are usually NOT in the base fee. They are still legitimate charges — but you want them itemized in the proposal so there are no surprises 60 days in." },
      { type: "ul", items: [
        "Special meetings beyond the contracted monthly cadence (typically $300–$600 per meeting).",
        "Legal demand-letter and lien-recording costs (typically pass-through plus a coordination fee).",
        "Records request copies (statute permits a reasonable charge).",
        "Owner welcome packets, estoppel certificate fees, transfer-of-ownership processing.",
        "After-hours emergency response beyond the included threshold.",
        "Capital project oversight fee — typically 5–10% of project cost, or an hourly arrangement.",
        "Reserve study commissioning (passed through to the reserve specialist with a coordination markup, or fully subscription-based).",
        "Insurance claim coordination beyond initial filing.",
      ]},
      { type: "callout", kind: "note", title: "Capital project oversight is the big one.",
        text: "A $200K roof replacement coordinated by your management firm — engineer engagement, RFP, contractor vetting, change-order review, draw-schedule approval, final acceptance — is real work, often spanning 4–6 months. Boards that expect this to be free under the base monthly fee end up either with under-supervised projects or with a fee discussion mid-project. Confirm the capital-project fee structure UPFRONT." },
    ]},
    { id: "philosophy", h2: "The scope-based philosophy", blocks: [
      { type: "p", text: "At Keys-Caldwell we price most engagements on a scope basis rather than purely per-unit. The starting question isn't \"how many units?\" — it's \"what does this community actually need?\" The answer is built up from a man-hour estimate." },
      { type: "p", text: "What goes into the man-hour estimate:" },
      { type: "ul", items: [
        "Building type and complexity — a high-rise with elevators, generator, fire suppression, and structural-component reserves needs more hours than a 30-unit garden HOA.",
        "Active-vs-static governance — boards that want monthly proactive engagement need more hours than boards that want monthly reporting only.",
        "Capital cycle — a community in the middle of a multi-year capital program needs more hours than one in steady-state.",
        "Owner profile — investor-heavy communities with high turnover need more transfer/estoppel coordination than long-term-resident communities.",
        "Vendor mix — communities with many small vendors need more accounting hours than communities with a handful of consolidated contracts.",
      ]},
      { type: "p", text: "The scope-based fee is the man-hour estimate × blended hourly rate, presented as a monthly fee. The ratio works out to a per-unit number you can compare to per-unit competitors, but the underlying logic is hours, not units. This is also why our proposals are rarely the cheapest — and why they rarely produce surprise add-on fees." },
      { type: "pillar-link", href: "/pricing/", label: "Our pricing approach",
        context: "More on the scope-based model and what a Keys-Caldwell proposal looks like." },
    ]},
    { id: "compare", h2: "How to compare proposals fairly", blocks: [
      { type: "p", text: "When you have three proposals in front of you, build an apples-to-apples table. Don't just compare the headline monthly fees." },
      { type: "h3", text: "Build a one-page comparison" },
      { type: "ul", items: [
        "Monthly fee (per-unit and total).",
        "Manager assignment — name, license, current portfolio size.",
        "Site visit cadence.",
        "Board meetings included per year.",
        "Capital project oversight — included? % of project? Hourly?",
        "Reserve study — coordinated? Subscription? Pass-through?",
        "After-hours / emergency response — included? How many incidents?",
        "Records request, estoppel, and transfer fees.",
        "Annualized total of base fee + ALL likely add-ons in a typical year.",
      ]},
      { type: "callout", kind: "pivot", title: "The annualized total is the only fair number.",
        text: "A $1,200/month base with $400/month in routine add-ons is $19,200/year. A $1,500/month base with everything included is $18,000/year. The headline number favored Firm A; the actual cost favored Firm B. Without the annualized comparison, this is impossible to see." },
    ]},
    { id: "faq", h2: "Quick-answer FAQ", blocks: [
      { type: "h3", text: "Are management fees negotiable?" },
      { type: "p", text: "Slightly, on the margin. A reputable firm has run the man-hour math and the proposal is close to break-even at the proposed fee. Aggressive negotiation typically results in either reduced scope (fewer hours = worse service) or eventual fee increases as the firm finds the work was under-priced." },
      { type: "h3", text: "Do management firms get kickbacks from vendors?" },
      { type: "p", text: "Reputable firms do not. Florida statute requires disclosure of any vendor referral compensation, and most boards' management agreements prohibit it outright. Ask the question explicitly during the RFP and confirm in the contract." },
      { type: "h3", text: "Why are some firms much cheaper than others?" },
      { type: "p", text: "Almost always: scope reduction, manager portfolio overload, or absent specialty depth. A firm whose manager carries 18 communities can quote a low fee per community, but the manager's hours-per-community are correspondingly thin. The math is honest; the service is not." },
      { type: "h3", text: "Should I prefer flat-fee or per-unit pricing?" },
      { type: "p", text: "Per-unit is conventional and easy to compare across firms. Scope-based / hybrid pricing is more accurate but requires more work to evaluate. Both can be good; flat-fee for very small communities is sometimes the only honest model." },
      { type: "callout", kind: "warning", title: "Not legal advice",
        text: "This article is operational guidance from a community association management firm, not legal advice. Florida community association law and your association's declaration govern the specifics of permissible fees and contract terms." },
    ]},
  ]},
