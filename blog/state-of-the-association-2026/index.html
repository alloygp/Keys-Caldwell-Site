        { type: "p", text: "Looking back at 2025 from the operating seat: it was a year of regulatory bedding-in. SB-4D's structural integrity reserve study requirements moved from \"new statute\" to \"normal practice\" — boards who hadn't engaged an engineer by year-end 2024 mostly did so during 2025, and the first full SIRS-driven budget cycles ran through October-December. Insurance markets, after the brutal 2023-2024 stretch, didn't soften, but they stopped getting worse on a year-over-year basis. Capital project costs (roofing, painting, paving) finally flattened against 2022-2024's run-up." },
        { type: "p", text: "On the negative side: the 2024 storm season's tail (Helene, Milton) ran into 2025 in three operationally important ways — insurance carriers tightened underwriting on coastal exposure, vendor capacity for restoration work stayed constrained through Q2, and a meaningful subset of boards moved up their seawall and waterproofing capital schedules in response to what they saw at neighboring properties. The 2025 hurricane season was quiet by comparison; the prior year still drove most of the operational friction." },

      { id: "insurance", h2: "Force 1 · The insurance market is tighter, not softer", blocks: [
        { type: "p", text: "The headline: 2025 wasn't a relief year for Florida property insurance, but it wasn't a worsening one either. Across our portfolio, master property premiums on coastal condominiums increased by an average of 6.4% on 2025 renewals — meaningfully above general inflation but a small fraction of the 18-31% increases boards saw on 2023 and 2024 renewals." },

        { type: "ul", items: [

          "Documented hurricane preparedness plan, with named-storm response protocol.",
          "Recent (within 24 months) waterproofing inspection and roof condition documentation.",
          "5-year claims history with detailed cause-of-loss summary.",

          "Wind-only carriers: capacity remains constrained but is no longer contracting. Citizens take-out activity continues.",
          "Master policy deductibles: hurricane / named-storm deductibles trending toward 5% of insured value (was 2-3%); boards should plan their reserve to absorb this.",

        { type: "p", text: "The reserve under-funding waiver — historically a tool boards used to keep regular assessments down by voting (annually, by majority) to fund reserves below the study-recommended level — is being phased out for SIRS-mandated structural components. This is where the 2026 confusion lives. The phase-out is not a single date; it is component-specific and inspection-cycle-specific." },
        { type: "h3", text: "What the phase-out actually says" },
        { type: "ul", items: [
          "For SIRS-defined components (roof, structural, waterproofing, etc., per FL 718.112(2)(g)): waiver and partial-funding authority is no longer permitted. These components must be funded at study-recommended levels.",
