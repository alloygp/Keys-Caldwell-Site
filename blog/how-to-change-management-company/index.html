    title: "How to Change Your HOA or Condo Management Company — A Board's Step-by-Step Guide",
    subtitle: "Switching management firms is one of the most consequential decisions a board makes. Here's the playbook we'd hand a board if they were sitting across the table from us — including the parts that make us look bad.",
    publishedDisplay: "March 14, 2026",
    updatedDisplay: "April 28, 2026",
    readTime: "13 min read",
    author: { initials: "LW", name: "Lauren Wilson", role: "President · Keys-Caldwell" },
    tldrLabel: "Answer-first",
    tldr: "To change management companies in Florida: (1) Read your current contract for termination terms — usually 30–90 days written notice. (2) Run a structured RFP with 3–4 firms and a 60-day proposal window. (3) Sign the new firm 90 days before transition to overlap on financials, vendor handoffs, and document migration. (4) Plan a 60-day parallel transition period — not a hard cut-over.",

    { id: "contract",       label: "Step 1: Read your existing contract" },
    { id: "rfp",            label: "Step 2: Run a structured RFP" },

    { id: "transition",     label: "Step 5: The 90-day transition" },
    { id: "redflags",       label: "Red flags during the handoff" },
    { id: "faq",            label: "Quick-answer FAQ" },
  ]},

  body: { sections: [
    { id: "when", h2: "When to consider switching", blocks: [
      { type: "p", text: "Most boards don't switch because of one bad month. They switch because of a pattern that becomes impossible to ignore. The most common patterns we see when new clients arrive at Keys-Caldwell:" },
      { type: "ul", items: [
        "Financial reports arrive late, contain errors, or aren't reconciled.",
        "Reserve studies are stale or — more concerning — were never done despite SIRS requirements.",
        "Vendor invoices show up without backup; coding is inconsistent month to month.",
        "Board questions take days to get answered, or get routed through a portal black hole.",
        "Manager turnover at the current firm has been frequent — three managers in two years is a structural problem, not a personnel one.",
        "Insurance, audit, or tax filings have been late or contested.",
      ]},
      { type: "callout", kind: "note", title: "If you're seeing one or two of these, talk to your current firm first.",
        text: "Most management firms — including ours — would rather solve a fixable issue than lose a client. A direct conversation about specific failures, with measurable expectations and a 60-day window, often produces better results than starting an RFP. If the conversation doesn't produce change, you've also documented your case for the eventual transition." },
    ]},
    { id: "contract", h2: "Step 1: Read your existing contract", blocks: [
      { type: "p", text: "Before you do anything else, read your current management agreement. The two clauses that determine your timeline:" },
      { type: "ol", items: [
        "Termination notice — typically 30, 60, or 90 days written notice. Some contracts allow termination only at the end of the contract term; others permit termination for cause at any time.",
        "Document and asset return — what your current firm is contractually required to deliver back to the association upon termination. Bank account signatory transitions, vendor contracts, owner records, historical financials, board minute books.",
      ]},
      { type: "p", text: "If your contract auto-renews, find out when. A contract that auto-renews on January 1 with 90-day notice means you must give written notice by October 1 of the prior year. Miss that window and you're locked in another full year." },
      { type: "h3", text: "Termination for cause vs. without cause" },
      { type: "p", text: "\"For cause\" terminations are typically immediate but require documented breach — the firm failed to perform a contractually-required duty. \"Without cause\" terminations require the contractual notice period and are simpler. Most board-initiated transitions go without cause." },
    ]},
    { id: "rfp", h2: "Step 2: Run a structured RFP", blocks: [
      { type: "p", text: "An RFP — Request For Proposal — is a written document that describes your community and asks competing firms to bid on managing it. A well-constructed RFP gives you comparable proposals; a vague one gives you marketing brochures. The RFP should include:" },
      { type: "ul", items: [
        "Community profile: number of units, building count, year built, amenities, current annual operating budget, current reserve balance.",
        "Specific services requested: financial management, vendor coordination, board meeting attendance, owner communication, insurance coordination, capital project oversight.",
        "Required exclusions: what you DON'T want bundled (sometimes boards prefer to keep their existing CPA, attorney, or insurance broker — make that explicit).",
        "Specific deliverable expectations: monthly financial packet contents, response time SLAs, board meeting cadence, manager site visit cadence.",
        "Reference requirements: at least three current client communities of similar size and type that the bidding firm can put you in touch with.",
      ]},
      { type: "p", text: "Send the RFP to 3–4 firms. More than that and the proposals start to blur; fewer and you don't have a meaningful comparison. Give firms a 30-day proposal window — anything less and serious firms will decline." },
      { type: "pillar-link", href: "/pricing/", label: "How to read a management proposal",
        context: "Our pricing page explains the scope-based model and the man-hour estimate that should anchor every proposal." },
    ]},
    { id: "evaluate", h2: "Step 3: Evaluate proposals beyond price", blocks: [
      { type: "p", text: "Price-only comparisons are the single biggest mistake we see. A proposal that's 20% cheaper because it excludes board meeting attendance, capital project oversight, or after-hours emergency response is not actually cheaper — it's a different scope. Build an evaluation matrix with these dimensions:" },
      { type: "h3", text: "Scope" },
      { type: "p", text: "Line up the deliverables side by side. If one firm's proposal is materially shorter than another's, ask why. Sometimes it's because they're more efficient; more often it's because they're proposing less work." },
      { type: "h3", text: "Team continuity" },
      { type: "p", text: "Ask which licensed manager would be assigned and how many other communities they manage. A manager carrying 15+ communities is, in practical terms, not going to give your board the attention you need. Ask about manager tenure at the firm." },
      { type: "h3", text: "Specialty depth" },
      { type: "p", text: "Does the firm have in-house accounting? Property services? Reserve study capability? Insurance coordination? Coastal-condo-specific experience with SIRS and milestone inspections? A general-purpose firm that hands every specialty out to subcontractors is almost always more expensive in the aggregate, and slower." },
      { type: "h3", text: "Technology" },
      { type: "p", text: "What portal does the firm use? Vantaca, AppFolio, BuildingLink, something proprietary? Owner experience and board reporting both flow through this. Ask for a demo." },
      { type: "h3", text: "References" },
      { type: "p", text: "Call the references. Ask about transitions specifically — how the firm handled the move-in. Ask about a difficult moment they had with the firm and how it was resolved. Generic positive references aren't useful; specific stories are." },
    ]},
    { id: "decide", h2: "Step 4: Board decision and member notice", blocks: [
      { type: "p", text: "The board votes on the new firm in a properly-noticed board meeting, with the executed proposal entering the minute book. Most associations don't require member vote on management changes — that's a board-discretion operational decision under both Chapter 718 (condo) and Chapter 720 (HOA). Confirm with your association's counsel for your specific declaration." },
      { type: "p", text: "Once the board has decided:" },
      { type: "ol", items: [
        "Send written termination notice to the current firm via certified mail (or whatever method the contract specifies). Be cordial and professional; you may need their cooperation during the handoff.",
        "Sign the new management agreement. Most firms ask for a 60–90-day pre-transition lead time so they can plan the handoff properly.",
        "Issue a member communication explaining the transition. Keep it factual — new firm name, transition date, what owners need to do (almost always: nothing, except update bank-draft information for assessments). Avoid characterizing the outgoing firm; the goal is owner confidence, not vindication.",
      ]},
    ]},
    { id: "transition", h2: "Step 5: The 90-day transition", blocks: [
      { type: "p", text: "A management transition is not a hard cut-over on a Sunday at midnight. It's a 60–90 day overlap during which the incoming firm takes over progressively while the outgoing firm winds down. The phases:" },
      { type: "h3", text: "Days -90 to -30: Pre-transition setup" },
      { type: "ul", items: [
        "Incoming firm reviews current financials, vendor contracts, and reserve schedule.",
        "Bank account signatory transitions are scheduled — typically takes 2–4 weeks at most banks.",
        "Vendor list is reviewed; some vendors stay, some are reviewed for replacement.",
        "Insurance broker, CPA, and attorney are notified and confirmed for continuity.",
        "Portal migration is staged — owner data exported, prepped for import.",
      ]},
      { type: "h3", text: "Day 0: Effective transition" },
      { type: "ul", items: [
        "Bank signatories switch.",
        "Vendor invoices route to the new firm.",
        "Owner portal goes live with the new firm; payment routing updates.",
        "First board meeting under new management is scheduled within 30 days.",
      ]},
      { type: "h3", text: "Days 1–60: Stabilization" },
      { type: "ul", items: [
        "First monthly financial packet under new management arrives — this is the first hard test.",
        "Reserve schedule is reviewed and updated against actual condition.",
        "Vendor performance is monitored; replacements happen as needed.",
        "Outgoing firm responds to historical-record requests as the new firm builds context.",
      ]},
      { type: "callout", kind: "pivot", title: "The first 60 days are about plumbing, not strategy.",
        text: "New boards sometimes want to see immediate strategic wins from a new firm — major vendor changes, new initiatives, major reserve restructuring. Resist this. The first 60 days should be operationally clean: financials reconciled, vendors paid on time, owners getting their statements, the portal working. Strategy comes after the plumbing is verified." },
    ]},
    { id: "redflags", h2: "Red flags during the handoff", blocks: [
      { type: "h3", text: "Outgoing firm slow-walks document return" },
      { type: "p", text: "If your former firm is slow to deliver historical financials, vendor contracts, or owner records, escalate immediately. The contract typically requires return within 30 days. If you're past 45 days, your association's attorney sends a demand letter." },
      { type: "h3", text: "Bank balance mismatch" },
      { type: "p", text: "When the new firm takes over the bank accounts, the balance should match the last reconciled financial report exactly. If there's a discrepancy, stop and reconcile before any other work proceeds." },
      { type: "h3", text: "\"Surprise\" vendor contracts" },
      { type: "p", text: "Occasionally a vendor contract surfaces during transition that the board never approved or is on terms the board didn't authorize. Document, evaluate, and if needed, exit per the contract terms." },
      { type: "h3", text: "Reserve study gaps" },
      { type: "p", text: "If your prior firm hasn't kept the reserve study current — or, in a condominium, if the SIRS isn't on file — the incoming firm should make this a day-one priority. Don't let a stale reserve picture roll into another budget cycle." },
      { type: "pillar-link", href: "/blog/florida-sirs-milestone-inspection-guide/", label: "SIRS & milestone inspection guide",
        context: "What every condo board should have on file before changing management firms." },
    ]},
    { id: "faq", h2: "Quick-answer FAQ", blocks: [
      { type: "h3", text: "How much does it cost to switch management companies?" },
      { type: "p", text: "Most reputable firms — including ours — do not charge a transition fee. The cost shows up in the new ongoing management agreement, which may be higher or lower than your current contract depending on scope. Ask explicitly during the RFP." },
      { type: "h3", text: "Can we switch mid-budget-year?" },
      { type: "p", text: "Yes. The annual budget belongs to the association; the management firm operates within it. A mid-year transition does require careful financial closeout — outgoing firm closes the books through the transition date, incoming firm picks up from there." },
      { type: "h3", text: "What if our contract has an early-termination penalty?" },
      { type: "p", text: "Some agreements include them. Read the clause carefully — many \"penalties\" are actually unearned-service refunds going the OTHER direction. If a real penalty applies, weigh it against the cost of staying. The annual cost of the wrong management firm almost always dwarfs a one-time transition penalty." },
      { type: "h3", text: "Can the outgoing firm refuse to cooperate?" },
      { type: "p", text: "They cannot refuse to return association records — those are association property, not firm property. They are not, however, obligated to spend significant time training the incoming firm. Plan for cooperative-but-minimal handoff support and set expectations accordingly." },
      { type: "callout", kind: "warning", title: "Not legal advice",
        text: "This article is operational guidance from a community association management firm, not legal advice. Florida community association law is specific and your declaration controls. Consult your association's legal counsel before terminating a management agreement." },
    ]},
  ]},
