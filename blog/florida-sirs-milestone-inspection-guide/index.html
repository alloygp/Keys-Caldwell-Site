      { id: "what-changed", h2: "What changed in 2022 — and why", blocks: [
        { type: "p", text: "On June 24, 2021, the Champlain Towers South in Surfside, Florida partially collapsed. Ninety-eight people died. In the year that followed, the Florida legislature passed SB-4D (signed May 26, 2022), which made two long-deferred reforms mandatory: structural milestone inspections for older buildings, and reserve studies that actually cover the structural components — concrete, roof, waterproofing, post-tension cables — that determine whether a building remains safe to occupy." },
        { type: "p", text: "Before SB-4D, Florida condo boards could waive reserves by majority owner vote. Most did. The result, repeated across the coast, was a generation of mid-rise buildings whose reserve balance bore no relationship to their actual capital condition. The new law removes the waiver option for the SIRS-defined components — and adds a documentation requirement that the engineering inspection has actually happened." },

          "Phase One — visual inspection. The engineer walks the building, reviews historical records, and produces a report that either certifies the building's structural integrity or determines that Phase Two is required.",

        ]},
        { type: "p", text: "The Phase One report is filed with the condominium association AND with the local building official. Owners get a summary. If Phase Two is required, the timeline for remediation is set in the engineer's report, with the local building official having jurisdiction to enforce it." },

        { type: "p", text: "A Structural Integrity Reserve Study is the financial counterpart to the milestone inspection. Where the milestone inspection asks \"is the building structurally sound?\", the SIRS asks \"can the association financially fund the structural maintenance the building actually needs?\"" },

        { type: "ul", items: [
          "Roof",
          "Load-bearing walls and primary structural members",
          "Floor (slabs)",
          "Foundation",
          "Fireproofing and fire protection systems",
          "Plumbing",
          "Electrical systems",
          "Waterproofing and exterior painting",
          "Windows and exterior doors",
          "Any other item with a deferred maintenance expense or replacement cost exceeding $10,000",

        { type: "callout", kind: "warning", title: "Not legal advice",
